name: publish

# Token-free publish via npm Trusted Publishing (OIDC).
# Fires when you publish a GitHub Release (recommended) or run it manually.
#
# ONE-TIME SETUP on npmjs.com (no long-lived token needed afterwards):
#   npmjs.com → package @decklijia/ai-coding-rules → Settings → "Trusted Publisher"
#   → add GitHub Actions publisher:
#       Organization/User : l17728
#       Repository        : ai-coding-rules
#       Workflow filename : publish.yml
#       Environment       : (leave blank, or set if you use one)
# After that, this workflow authenticates via OIDC — no NPM_TOKEN secret required.
#
# Release flow:
#   1) bump version in package.json (npm version patch|minor|major)
#   2) push, then create a GitHub Release with tag v<version>
#   3) this workflow validates + publishes that version

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Validate ruleset (structure + frontmatter + secret scan)
        run: node bin/cli.js validate

      - name: Publish to npm (OIDC, token-free, with provenance)
        run: npm publish --access public --provenance
